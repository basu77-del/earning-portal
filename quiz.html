<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQ Quiz Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            padding: 20px;
            text-align: center;
        }
        .quiz-box {
            max-width: 450px;
            background: white;
            margin: 30px auto;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 { color: #2980b9; }
        .question {
            font-size: 18px;
            font-weight: bold;
            margin: 20px 0;
            color: #333;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .opt-btn {
            background-color: #ecf0f1;
            color: #2c3e50;
            border: 2px solid #bdc3c7;
            padding: 12px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .opt-btn:hover {
            background-color: #34495e;
            color: white;
        }
        .score-area {
            margin-top: 20px;
            font-size: 16px;
            font-weight: bold;
            color: #27ae60;
        }
        .back-btn {
            display: inline-block;
            margin-top: 25px;
            color: #7f8c8d;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="quiz-box">
    <h2>🎮 Mind Games & Quiz</h2>
    <hr>
    
    <!-- Question Display -->
    <div class="question" id="qText">Question loading...</div>
    
    <!-- Options Buttons -->
    <div class="options">
        <button class="opt-btn" onclick="checkAnswer(0)" id="opt0">Option 1</button>
        <button class="opt-btn" onclick="checkAnswer(1)" id="opt1">Option 2</button>
        <button class="opt-btn" onclick="checkAnswer(2)" id="opt2">Option 3</button>
    </div>

    <!-- Score Board -->
    <div class="score-area">
        Score: <span id="scoreDisplay">0</span> / 3
    </div>

    <a href="index.html" class="back-btn">← Back to Home</a>
</div>

<script>
    // Quiz Questions Data (Array of Objects)
    const quizData = [
        {
            question: "1. Nepal ko sabai bhanda thulo pradesh kun ho?",
            options: ["Karnali Pradesh", "Koshi Pradesh", "Sudurpashchim Pradesh"],
            correct: 0
        },
        {
            question: "2. Computer ko brain bhanera kaslai chiniन्छ?",
            options: ["RAM", "CPU", "Hard Disk"],
            correct: 1
        },
        {
            question: "3. Website banauda layout/design garne code kun ho?",
            options: ["HTML", "JavaScript", "CSS"],
            correct: 2
        }
    ];

    let currentQuestionIndex = 0;
    let score = 0;

    // Function to load questions dynamically
    function loadQuestion() {
        if (currentQuestionIndex < quizData.length) {
            let currentQuiz = quizData[currentQuestionIndex];
            document.getElementById('qText').innerText = currentQuiz.question;
            document.getElementById('opt0').innerText = currentQuiz.options[0];
            document.getElementById('opt1').innerText = currentQuiz.options[1];
            document.getElementById('opt2').innerText = currentQuiz.options[2];
        } else {
            // Game Over Screen
            document.getElementById('qText').innerHTML = "🎉 Quiz Complete! <br> Tapaile sabai question khelisakhnu bhayo.";
            document.querySelector('.options').style.display = 'none';
        }
    }

    // Function to check answer logic
    function checkAnswer(selectedIndex) {
        let correctIndex = quizData[currentQuestionIndex].correct;
        
        if (selectedIndex === correctIndex) {
            score++;
            document.getElementById('scoreDisplay').innerText = score;
            alert("Sahi uttar! 🎉");
        } else {
            alert("Galti uttar! ❌");
        }

        currentQuestionIndex++;
        loadQuestion();
    }

    // Initialize first question on page load
    loadQuestion();
</script>

</body>
</html>

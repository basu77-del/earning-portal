<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQ Quiz Game with Earnings</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            padding: 20px;
            text-align: center;
        }
        .quiz-box {
            max-width: 450px;
            background: white;
            margin: 30px auto;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 { color: #2980b9; margin-bottom: 5px; }
        
        /* Coin Dashboard Style */
        .coin-dashboard {
            background: #f1c40f;
            color: #2c3e50;
            padding: 10px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            display: inline-block;
        }
        
        .question {
            font-size: 18px;
            font-weight: bold;
            margin: 20px 0;
            color: #333;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .opt-btn {
            background-color: #ecf0f1;
            color: #2c3e50;
            border: 2px solid #bdc3c7;
            padding: 12px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .opt-btn:hover {
            background-color: #34495e;
            color: white;
        }
        .score-area {
            margin-top: 20px;
            font-size: 14px;
            color: #7f8c8d;
        }
        .back-btn {
            display: inline-block;
            margin-top: 25px;
            color: #7f8c8d;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="quiz-box">
    <h2>🎮 Mind Games & Quiz</h2>
    
    <!-- Total Coins Display -->
    <div class="coin-dashboard">
        🪙 My Total Balance: <span id="totalCoins">0</span> Coins
    </div>
    <hr>
    
    <!-- Question Display -->
    <div class="question" id="qText">Question loading...</div>
    
    <!-- Options Buttons -->
    <div class="options">
        <button class="opt-btn" onclick="checkAnswer(0)" id="opt0">Option 1</button>
        <button class="opt-btn" onclick="checkAnswer(1)" id="opt1">Option 2</button>
        <button class="opt-btn" onclick="checkAnswer(2)" id="opt2">Option 3</button>
    </div>

    <!-- Current Round Score -->
    <div class="score-area">
        Current Round: <span id="scoreDisplay">0</span> / 3 Correct
    </div>

    <a href="index.html" class="back-btn">← Back to Home</a>
</div>

<script>
    const quizData = [
        {
            question: "1. Nepal ko sabai bhanda thulo pradesh kun ho?",
            options: ["Karnali Pradesh", "Koshi Pradesh", "Sudurpashchim Pradesh"],
            correct: 0
        },
        {
            question: "2. Computer ko brain bhanera kaslai chiniन्छ?",
            options: ["RAM", "CPU", "Hard Disk"],
            correct: 1
        },
        {
            question: "3. Website banauda layout/design garne code kun ho?",
            options: ["HTML", "JavaScript", "CSS"],
            correct: 2
        }
    ];

    let currentQuestionIndex = 0;
    let currentScore = 0;
    
    // Mobile storage bata purano coin load garne (yadi chhaina bhane 0 hunchha)
    let totalCoins = parseInt(localStorage.getItem('userCoins')) || 0;

    // Display coin balance on screen load
    document.getElementById('totalCoins').innerText = totalCoins;

    function loadQuestion() {
        if (currentQuestionIndex < quizData.length) {
            let currentQuiz = quizData[currentQuestionIndex];
            document.getElementById('qText').innerText = currentQuiz.question;
            document.getElementById('opt0').innerText = currentQuiz.options[0];
            document.getElementById('opt1').innerText = currentQuiz.options[1];
            document.getElementById('opt2').innerText = currentQuiz.options[2];
        } else {
            document.getElementById('qText').innerHTML = "🎉 Quiz Complete!<br>Sahi uttar ko Coins tapai ko account ma thapiyo.";
            document.querySelector('.options').style.display = 'none';
        }
    }

    function checkAnswer(selectedIndex) {
        let correctIndex = quizData[currentQuestionIndex].correct;
        
        if (selectedIndex === correctIndex) {
            currentScore++;
            document.getElementById('scoreDisplay').innerText = currentScore;
            
            // Sahi uttar bhaye 10 coins thapne
            totalCoins += 10;
            
            // Mobile memory (localStorage) ma permanent save garne
            localStorage.setItem('userCoins', totalCoins);
            
            // Screen ma coin update garne
            document.getElementById('totalCoins').innerText = totalCoins;
            
            alert("Sahi uttar! Tapaile +10 Coins kamaunu bhayo! 🎉");
        } else {
            alert("Galti uttar! ❌ Coins thapiyena.");
        }

        currentQuestionIndex++;
        loadQuestion();
    }

    loadQuestion();
</script>

</body>
</html>
